name: CI / Release

# Runs on every branch push and PR for build/test verification.
# When a semver tag is pushed (e.g. git tag 1.0.0 && git push origin 1.0.0),
# the release job also runs: it stamps the version, publishes a GitHub Release,
# and attaches the required Obsidian plugin artefacts.

on:
  push:
    branches: ["**"]
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"   # 1.0.0, 1.2.3 — no v prefix
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Allow tag-triggered runs to complete; cancel redundant branch runs
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

# ─── Job 1: Build & Test (runs on every push / PR) ───────────────────────────

jobs:
  build-test:
    name: Type-check · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "25"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: TypeScript type-check
        run: npx tsc --noEmit --skipLibCheck

      - name: Run unit tests
        run: npm test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

      - name: Build plugin
        run: node esbuild.config.mjs production

      - name: Verify required artefacts exist
        run: |
          for f in main.js manifest.json styles.css; do
            [ -f "$f" ] || { echo "Missing: $f"; exit 1; }
          done
          echo "All required artefacts present."

# ─── Job 2: Release (runs only on semver tag pushes) ─────────────────────────

  release:
    name: Publish GitHub Release
    needs: build-test
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create releases, push tags, push version-bump commit

    steps:
      - name: Checkout (full history for tag inspection)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.VERSION_BUMP_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      - name: Stamp manifest.json
        run: |
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            m.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
          "

      - name: Stamp package.json
        run: npm version --no-git-tag-version ${{ steps.version.outputs.version }}

      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json package.json package-lock.json
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git push origin HEAD:main

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "25"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build production bundle
        run: node esbuild.config.mjs production

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            main.js
            manifest.json
            styles.css
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "### Released ${{ steps.version.outputs.version }} 🚀" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Install via [BRAT](https://github.com/TfTHacker/obsidian42-brat): \`${{ github.repository }}\`" >> "$GITHUB_STEP_SUMMARY"
