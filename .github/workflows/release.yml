name: Release

# Push a semver tag (e.g. git tag 0.2.0 && git push origin 0.2.0) to trigger a release.
# The workflow stamps manifest.json + package.json with the tag version, commits that
# back to main, then publishes a GitHub Release with the required Obsidian artefacts.

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"   # matches 0.1.0, 1.2.3, etc. — no v prefix

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # never abort an in-flight release

jobs:
  release:
    name: Build & Publish GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create releases, push tags, push version-bump commit

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
          # Use a PAT so the version-bump commit can trigger downstream CI.
          # Falls back to GITHUB_TOKEN if VERSION_BUMP_TOKEN is not set (no CI re-trigger).
          token: ${{ secrets.VERSION_BUMP_TOKEN || secrets.GITHUB_TOKEN }}

      # ── Derive version from tag ─────────────────────────────────────────────

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag version: $VERSION"

      # ── Stamp manifest.json and package.json ────────────────────────────────

      - name: Update manifest.json version
        run: |
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            m.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
          "

      - name: Update package.json version
        run: npm version --no-git-tag-version ${{ steps.version.outputs.version }}

      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json package.json package-lock.json
          # Only commit if there are staged changes (idempotent if already up to date)
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git push origin HEAD:main

      # ── Build ───────────────────────────────────────────────────────────────

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: "25"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit --skipLibCheck

      - name: Run tests
        run: npm test

      - name: Build production bundle
        run: node esbuild.config.mjs production

      # ── Publish ─────────────────────────────────────────────────────────────

      - name: Create GitHub Release and upload artefacts
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191  # v2.2.1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            main.js
            manifest.json
            styles.css
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "### Released ${{ steps.version.outputs.version }} 🚀" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Install via [BRAT](https://github.com/TfTHacker/obsidian42-brat):" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ github.repository }}" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
