name: Dependency Scan

# Runs daily at 08:00 UTC.
# - Trivy: CVEs (HIGH/CRITICAL), secrets, and licence compliance
# - npm outdated: informational list of stale packages
# Can also be triggered manually from the Actions tab.

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  trivy:
    name: Trivy · vuln + secret + licence
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "25"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      # Fail on HIGH or CRITICAL CVEs in npm dependencies.
      - name: Scan dependencies for vulnerabilities
        run: |
          trivy fs . \
            --scanners vuln \
            --pkg-types library \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --format table

      # Fail if any secrets or credentials are detected in the codebase.
      - name: Scan for secrets
        run: |
          trivy fs . \
            --scanners secret \
            --exit-code 1 \
            --format table

      # Informational — flags GPL/AGPL/SSPL licences that conflict with MIT.
      # Does not fail the job; review flagged packages manually.
      - name: Scan for licence compliance
        run: |
          trivy fs . \
            --scanners license \
            --severity HIGH,CRITICAL \
            --format table

      # Informational — lists packages with newer versions available.
      - name: Check for outdated packages
        run: npm outdated || true

      # Combined summary written to the Actions job summary page.
      - name: Summary report
        if: always()
        run: |
          echo "### Dependency scan — $(date -u '+%Y-%m-%d')" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "#### Vulnerabilities (HIGH / CRITICAL)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          trivy fs . --scanners vuln --pkg-types library \
            --severity HIGH,CRITICAL --format table 2>&1 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Secret detection" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          trivy fs . --scanners secret --format table 2>&1 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Licence compliance (HIGH / CRITICAL)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          trivy fs . --scanners license \
            --severity HIGH,CRITICAL --format table 2>&1 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Outdated packages" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npm outdated 2>&1 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
