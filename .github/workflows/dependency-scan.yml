name: Dependency Scan

# Runs daily at 08:00 UTC and on manual dispatch.
# Informational only — never fails the workflow.
# All findings are written to the Actions job summary for review.

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  trivy:
    name: Trivy · vuln + secret + licence
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "25"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      # ── Scans (exit-code 0 — informational, never blocks the workflow) ────────

      - name: Scan dependencies for vulnerabilities
        run: |
          trivy fs . \
            --scanners vuln \
            --pkg-types library \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            --format table \
            2>&1 | tee trivy-vuln.txt

      - name: Scan for secrets
        run: |
          trivy fs . \
            --scanners secret \
            --exit-code 0 \
            --format table \
            2>&1 | tee trivy-secrets.txt

      - name: Scan for licence compliance
        run: |
          trivy fs . \
            --scanners license \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            --format table \
            2>&1 | tee trivy-licences.txt

      - name: Check for outdated packages
        run: npm outdated 2>&1 | tee npm-outdated.txt || true

      # ── Upload raw scan artefacts ─────────────────────────────────────────────

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: trivy-scan-${{ github.run_id }}
          path: |
            trivy-vuln.txt
            trivy-secrets.txt
            trivy-licences.txt
            npm-outdated.txt
          if-no-files-found: ignore

      # ── Job summary ───────────────────────────────────────────────────────────

      - name: Write summary report
        if: always()
        run: |
          DATE=$(date -u '+%Y-%m-%d')
          {
            echo "## Dependency scan — ${DATE}"
            echo ""

            echo "### Vulnerabilities (HIGH / CRITICAL)"
            echo '```'
            cat trivy-vuln.txt 2>/dev/null || echo "(no output)"
            echo '```'
            echo ""

            echo "### Secret detection"
            echo '```'
            cat trivy-secrets.txt 2>/dev/null || echo "(no output)"
            echo '```'
            echo ""

            echo "### Licence compliance (HIGH / CRITICAL)"
            echo '```'
            cat trivy-licences.txt 2>/dev/null || echo "(no output)"
            echo '```'
            echo ""

            echo "### Outdated packages"
            echo '```'
            cat npm-outdated.txt 2>/dev/null || echo "(all packages up to date)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
